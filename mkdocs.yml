site_name: 3C Platform
site_url: https://ncmlab.github.io/NCMLabOnlineTools/
site_description: Open-source platform for developing, administering, and interpreting behavioural and cognitive assessments in-person or remotely.
site_author: Jason Steffener, University of Ottawa
repo_url: https://github.com/NCMlab/NCMLabOnlineTools
repo_name: NCMlab/NCMLabOnlineTools

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Your First Experiment: getting-started/first-experiment.md
  - Platform:
    - Overview: platform/overview.md
    - Administration Modes: platform/administration.md
    - The Central Executive: platform/central-executive.md
  - Usage Types:
    - Pre-defined Battery: usage-types/predefined.md
    - User Choice: usage-types/user-choice.md
    - Experiment Manager: usage-types/experiment-manager.md
  - Tasks:
    - Task Structure: tasks/task-structure.md
    - Configuration Files: tasks/configuration.md
    - Header Buttons: tasks/header-buttons.md
    - Available Tasks: tasks/available-tasks.md
  - Features:
    - Languages: features/languages.md
    - Response Types: features/response-types.md
    - Adaptive Difficulty: features/adaptive-difficulty.md
  - Backend (NeuroClinic): backend.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NCMlab/NCMLabOnlineTools
      name: NCMLabOnlineTools on GitHub
    - icon: fontawesome/brands/github
      link: https://github.com/NCMlab/NeuroClinicPublic
      name: NeuroClinicPublic on GitHub
